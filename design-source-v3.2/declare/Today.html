  .entry-chips{ justify-content:center; }

  @media (min-width:481px){

    .entry-crisis{ margin-top:22px; font-size:13px; }

<script>
(function(){
  var selected = 'Fear & Anxiety';

  // main chips (single-select, excluding "More +")
  var chips = document.getElementById('chips');
  chips.addEventListener('click', function(e){
    var c = e.target.closest('.chip'); if(!c) return;
    if(c.id === 'moreBtn'){ openSheet(); return; }
    chips.querySelectorAll('.chip:not(.more)').forEach(function(x){ x.classList.remove('on'); });
    c.classList.add('on');
    selected = c.dataset.struggle.replace(/&amp;/g,'&');
  });

  document.getElementById('receiveBtn').addEventListener('click', go);
  document.getElementById('writeForm').addEventListener('submit', function(e){
    e.preventDefault();
    var v = document.getElementById('writeInput').value.trim();
    if(v) selected = v;
    go();
  });
  // composer: grow with the text, submit on Enter (Shift+Enter for a new line)
  var wi = document.getElementById('writeInput');
  function autogrow(){ wi.style.height='auto'; wi.style.height=Math.min(wi.scrollHeight,168)+'px'; }
  if(wi){
    wi.addEventListener('input', autogrow);
    wi.addEventListener('keydown', function(e){
      if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); if(wi.form.requestSubmit){ wi.form.requestSubmit(); } else { wi.form.dispatchEvent(new Event('submit',{cancelable:true})); } }
    });
  }
  function go(){ try{ localStorage.setItem('declare-struggle', selected); }catch(e){} location.href = 'Results.html'; }

  // Deep-link: arrive from a marketing/SEO page with ?struggle=… and open pre-selected.
  // If the struggle only lives in the "More" sheet, promote it into the main row so it
  // always reads as chosen — the user's intent is never dropped at the threshold.
  function preselect(s){
    s = s.trim(); if(!s) return;
    var main = Array.prototype.slice.call(chips.querySelectorAll('.chip:not(.more)'));
    var match = null;
    main.forEach(function(x){ if(x.dataset.struggle.replace(/&amp;/g,'&')===s) match=x; });
    main.forEach(function(x){ x.classList.remove('on'); });
    if(match){ match.classList.add('on'); }
    else {
      var b=document.createElement('button');
      b.className='chip on'; b.setAttribute('data-struggle', s); b.textContent = s;
      chips.insertBefore(b, chips.firstChild);
    }
    selected = s;
  }
  try{
    var _inc = new URLSearchParams(location.search).get('struggle');
    if(_inc) preselect(_inc);
  }catch(e){}

  // sheet
  var sheet = document.getElementById('sheet'), scrim = document.getElementById('scrim');
  var sheetCta = document.getElementById('sheetCta');
  function openSheet(){ sheet.classList.add('open'); scrim.classList.add('open'); sheet.setAttribute('aria-hidden','false'); }
  function closeSheet(){ sheet.classList.remove('open'); scrim.classList.remove('open'); sheet.setAttribute('aria-hidden','true'); }
  document.getElementById('moreBtn').addEventListener('click', openSheet);
  document.getElementById('sheetClose').addEventListener('click', closeSheet);
  scrim.addEventListener('click', closeSheet);

  // sheet chips select across all categories
  function syncMain(s){
    var matched=false;
    chips.querySelectorAll('.chip:not(.more)').forEach(function(x){
      var on = x.dataset.struggle.replace(/&amp;/g,'&')===s;
      x.classList.toggle('on', on); if(on) matched=true;
    });
    if(!matched) chips.querySelectorAll('.chip:not(.more)').forEach(function(x){ x.classList.remove('on'); });
  }
  sheet.querySelectorAll('[data-cat]').forEach(function(group){
    group.addEventListener('click', function(e){
      var c = e.target.closest('.chip'); if(!c) return;
      sheet.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('on'); });
      c.classList.add('on');
      var s = c.dataset.struggle.replace(/&amp;/g,'&');
      selected = s;
      sheetCta.querySelector('.cta-n').innerHTML = '&middot; ' + c.innerHTML;
      syncMain(s);
    });
  });
  document.getElementById('sheetForm').addEventListener('submit', function(e){
    e.preventDefault();
    var v = this.querySelector('input').value.trim();
    if(v) selected = v;
    go();
  });
  sheetCta.addEventListener('click', go);
})();
</script>
</body>
</html>
