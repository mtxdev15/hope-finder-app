<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>(function(){function swallow(t){if(t){try{t.finished&&t.finished.catch(function(){});}catch(e){}try{t.ready&&t.ready.catch(function(){});}catch(e){}try{t.updateCallbackDone&&t.updateCallbackDone.catch(function(){});}catch(e){}}}addEventListener("pagereveal",function(e){swallow(e.viewTransition);});addEventListener("pageswap",function(e){swallow(e.viewTransition);});addEventListener("unhandledrejection",function(e){var r=e&&e.reason,m=(r&&(r.message||r.name))||(typeof r==="string"?r:"");if(/transition was skipped/i.test(m))e.preventDefault();});})();</script>
<meta charset="UTF-8" />
<style id="anti-flash">/* __anti_flash__ — paints a solid theme color on the FIRST frame so there is
   never a white blink between documents (the page's gradient layers on top once declare.css loads).
   background-color !important survives the page's shorthand `background:var(--bgfield)` which would
   otherwise reset the color to transparent before the custom property is defined. */
html{background-color:#0E1A14!important;}
html[data-theme="light"]{background-color:#FAF7F2!important;}
.rl-overlay{opacity:0!important;visibility:hidden!important;}
.rl-overlay.rl-show{opacity:1!important;visibility:visible!important;}
</style>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c130f" />
<title>Declare — Searching the Word</title>

<!-- brand icons -->
<link rel="icon" type="image/png" sizes="32x32" href="brand/favicon-32.png" />
<link rel="icon" type="image/png" sizes="64x64" href="brand/favicon-64.png" />
<link rel="apple-touch-icon" href="brand/apple-touch-icon.png" />
<!-- social sharing -->
<meta property="og:type" content="website" />
<meta property="og:title" content="Declare &amp; Believe — Scripture, for the weight you carry" />
<meta property="og:description" content="Name what's heavy and receive His Word for this moment." />
<meta property="og:image" content="brand/og.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="brand/og.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="declare.css" />
<style>
  html,body{ height:100%; }
  body{ background:var(--bg); }

  /* ===== full-screen loading field ===== */
  .load{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--bgfield); overflow:hidden; padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom); }
  /* warm gold breathing glow behind the book */
  .load::before{ content:""; position:absolute; left:50%; top:46%; width:min(620px,124vw); aspect-ratio:1; transform:translate(-50%,-50%);
    background:radial-gradient(circle, var(--glow1), transparent 60%); filter:blur(10px); opacity:.9;
    animation:breathe 6.4s ease-in-out infinite; pointer-events:none; }
  /* cinematic vignette to focus the eye */
  .load::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(120% 100% at 50% 44%, transparent 52%, rgba(0,0,0,.5) 100%); }
  @keyframes breathe{ 0%,100%{ opacity:.6; transform:translate(-50%,-50%) scale(.92); } 50%{ opacity:1; transform:translate(-50%,-50%) scale(1.07); } }

  /* drifting gold motes */
  .motes{ position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .motes i{ position:absolute; bottom:-8px; width:5px; height:5px; border-radius:50%;
    background:radial-gradient(circle, rgba(234,206,130,.9), rgba(234,206,130,0) 70%);
    opacity:0; animation:rise linear infinite; }
  .motes i:nth-child(1){ left:18%; width:4px; height:4px; animation-duration:9s;  animation-delay:0s; }
  .motes i:nth-child(2){ left:32%; width:6px; height:6px; animation-duration:12s; animation-delay:2.4s; }
  .motes i:nth-child(3){ left:47%; width:3px; height:3px; animation-duration:8s;  animation-delay:4.1s; }
  .motes i:nth-child(4){ left:63%; width:5px; height:5px; animation-duration:11s; animation-delay:1.2s; }
  .motes i:nth-child(5){ left:74%; width:4px; height:4px; animation-duration:10s; animation-delay:5.6s; }
  .motes i:nth-child(6){ left:86%; width:6px; height:6px; animation-duration:13s; animation-delay:3.3s; }
  @keyframes rise{
    0%{ opacity:0; transform:translateY(0) translateX(0) scale(.7); }
    12%{ opacity:.7; }
    80%{ opacity:.5; }
    100%{ opacity:0; transform:translateY(-78vh) translateX(14px) scale(1.1); }
  }

  /* ===== brand mark ===== */
  .mark{ width:116px; height:116px; margin-bottom:40px; position:relative; z-index:2;
    display:flex; align-items:center; justify-content:center;
    animation:markIn 1.1s cubic-bezier(.2,.7,.2,1) both, markFloat 6s ease-in-out 1.1s infinite; }
  .mark::before{ content:""; position:absolute; inset:-34%; border-radius:50%; z-index:-1;
    background:radial-gradient(circle, rgba(222,190,100,.28), transparent 66%); filter:blur(4px);
    animation:halo 4.6s ease-in-out infinite; }
  .mark img{ width:100%; height:100%; object-fit:contain;
    filter:drop-shadow(0 6px 18px rgba(0,0,0,.45)) drop-shadow(0 0 22px rgba(222,190,100,.34)); }
  @keyframes markIn{ from{ opacity:0; transform:translateY(-10px) scale(.86); } to{ opacity:1; transform:none; } }
  @keyframes markFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
  @keyframes halo{ 0%,100%{ opacity:.55; transform:scale(.94); } 50%{ opacity:1; transform:scale(1.08); } }

  /* ===== the flipping Bible ===== */
  .book{ --w:104px; --h:132px; --dur:3.4s;
    position:relative; width:calc(var(--w)*2); height:var(--h); z-index:2;
    perspective:1700px; perspective-origin:50% 36%;
    animation:bookIn 1.2s cubic-bezier(.2,.7,.2,1) .15s both; }
  @keyframes bookIn{ from{ opacity:0; transform:translateY(16px) scale(.9); } to{ opacity:1; transform:none; } }
  /* subtle living sway of the whole book */
  .book__scene{ position:absolute; inset:0; transform-style:preserve-3d; transform:rotateX(34deg);
    animation:sway 9s ease-in-out infinite; }
  @keyframes sway{ 0%,100%{ transform:rotateX(33deg) rotateZ(-1.1deg); } 50%{ transform:rotateX(36deg) rotateZ(1.1deg); } }

  /* soft contact shadow beneath the book */
  .book__shadow{ position:absolute; left:50%; bottom:-26px; width:74%; height:30px; transform:translateX(-50%);
    background:radial-gradient(ellipse, rgba(0,0,0,.55), transparent 72%); filter:blur(7px); z-index:0;
    animation:contact 9s ease-in-out infinite; }
  @keyframes contact{ 0%,100%{ opacity:.7; transform:translateX(-50%) scaleX(.96); } 50%{ opacity:.95; transform:translateX(-50%) scaleX(1.04); } }

  /* the two resting page stacks (left already-read / right yet-to-read) */
  .stack{ position:absolute; top:0; width:var(--w); height:var(--h); border-radius:3px 7px 7px 3px;
    background:linear-gradient(105deg,#F6EFDD,#EaDEC2 88%);
    box-shadow:inset 0 0 0 1px rgba(154,122,36,.16); }
  .stack.left{ left:0; transform-origin:right center; transform:rotateY(8deg); border-radius:7px 3px 3px 7px;
    background:linear-gradient(255deg,#F6EFDD,#EADEC2 88%); }
  .stack.right{ left:var(--w); transform-origin:left center; transform:rotateY(-8deg); }
  /* gilded fore-edges (the gold page block you see from the side) */
  .stack::after{ content:""; position:absolute; top:2px; bottom:2px; width:7px;
    background:linear-gradient(var(--gold),#B8923A); }
  .stack.left::after{ left:-7px; border-radius:3px 0 0 3px; box-shadow:-1px 0 3px rgba(0,0,0,.35); }
  .stack.right::after{ right:-7px; border-radius:0 3px 3px 0; box-shadow:1px 0 3px rgba(0,0,0,.35); }
  /* faint ruled "scripture" lines on the resting pages */
  .stack .lines{ position:absolute; inset:14px 14px 16px; border-radius:2px;
    background:repeating-linear-gradient(transparent 0 9px, rgba(154,122,36,.16) 9px 10px); opacity:.7; }
  .stack.left .lines{ inset:14px 16px 16px 14px; }

  /* central spine glow */
  .spine{ position:absolute; left:calc(var(--w) - 1px); top:1px; width:3px; height:calc(var(--h) - 2px);
    background:linear-gradient(var(--goldd),#7c5f1c); transform:translateZ(1px); z-index:5;
    box-shadow:0 0 12px rgba(222,190,100,.55); }

  /* turning leaves */
  .leaf{ position:absolute; left:var(--w); top:0; width:var(--w); height:var(--h);
    transform-origin:left center; transform-style:preserve-3d; will-change:transform;
    animation:flip var(--dur) cubic-bezier(.46,.03,.30,1) infinite, leaffade var(--dur) linear infinite;
    animation-delay:var(--d); }
  .leaf .face{ position:absolute; inset:0; border-radius:3px 7px 7px 3px; backface-visibility:hidden;
    background:linear-gradient(105deg,#FBF5E6,#EFE3C8 92%);
    box-shadow:inset 1px 0 0 rgba(154,122,36,.22), inset 0 0 0 1px rgba(154,122,36,.08); overflow:hidden; }
  .leaf .face.back{ transform:rotateY(180deg);
    background:linear-gradient(255deg,#FBF5E6,#EFE3C8 92%); border-radius:7px 3px 3px 7px; }
  .leaf .face::before{ content:""; position:absolute; inset:13px 12px 15px;
    background:repeating-linear-gradient(transparent 0 9px, rgba(154,122,36,.18) 9px 10px); opacity:.65; }
  /* light catch / curl sheen that sweeps as the page turns */
  .leaf .shade{ position:absolute; inset:0; border-radius:3px 7px 7px 3px; z-index:2; pointer-events:none;
    background:linear-gradient(105deg, rgba(255,250,235,.55) 0%, rgba(255,250,235,0) 34%, rgba(60,46,14,.12) 78%, rgba(60,46,14,.32) 100%);
    animation:sheen var(--dur) ease-in-out infinite; animation-delay:var(--d); }
  @keyframes sheen{ 0%,100%{ opacity:.15; } 30%{ opacity:.55; } 50%{ opacity:.85; } 70%{ opacity:.5; } }

  .leaf:nth-child(1){ --d:calc(var(--dur) * -.00); }
  .leaf:nth-child(2){ --d:calc(var(--dur) * -.14); }
  .leaf:nth-child(3){ --d:calc(var(--dur) * -.29); }
  .leaf:nth-child(4){ --d:calc(var(--dur) * -.45); }
  .leaf:nth-child(5){ --d:calc(var(--dur) * -.62); }
  .leaf:nth-child(6){ --d:calc(var(--dur) * -.80); }

  @keyframes flip{
    0%   { transform:rotateY(-8deg);   z-index:6; }
    6%   { transform:rotateY(-13deg); }
    50%  { transform:rotateY(-95deg); }
    94%  { transform:rotateY(-167deg); }
    100% { transform:rotateY(-172deg); z-index:1; }
  }
  /* fade leaves at the very start/end of the turn so the loop reset is invisible */
  @keyframes leaffade{ 0%{ opacity:0; } 6%{ opacity:1; } 91%{ opacity:1; } 100%{ opacity:0; } }

  /* ===== copy ===== */
  .copy{ position:relative; z-index:2; margin-top:60px; text-align:center;
    animation:copyIn 1.1s cubic-bezier(.2,.7,.2,1) .45s both; }
  @keyframes copyIn{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:none; } }
  .copy h1{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:28px; letter-spacing:.01em; color:var(--text); white-space:nowrap; }
  .copy h1 .dots i{ opacity:.25; animation:blink 1.5s infinite; }
  .copy h1 .dots i:nth-child(2){ animation-delay:.22s; }
  .copy h1 .dots i:nth-child(3){ animation-delay:.44s; }
  @keyframes blink{ 0%,80%,100%{ opacity:.25; } 40%{ opacity:1; } }

  /* cycling verse reference */
  .verse{ height:22px; margin-top:15px; position:relative; }
  .verse span{ position:absolute; left:0; right:0; top:0; font-size:12.5px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--goldd); font-weight:600; opacity:0; transform:translateY(4px); }
  .verse span.on{ animation:verse 2.9s cubic-bezier(.4,0,.2,1) both; }
  @keyframes verse{ 0%{ opacity:0; transform:translateY(6px); filter:blur(3px); } 16%,70%{ opacity:1; transform:none; filter:blur(0); } 100%{ opacity:0; transform:translateY(-6px); filter:blur(3px); } }

  /* slim gold seeking shimmer */
  .seek{ position:relative; z-index:2; margin-top:32px; width:200px; height:3px; border-radius:3px;
    background:var(--line2); overflow:hidden; animation:copyIn 1.1s cubic-bezier(.2,.7,.2,1) .6s both; }
  .seek::before{ content:""; position:absolute; top:0; left:0; height:100%; width:46%; border-radius:3px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent); animation:seek 2.1s cubic-bezier(.5,0,.5,1) infinite; }
  @keyframes seek{ 0%{ transform:translateX(-120%); } 100%{ transform:translateX(330%); } }

  @media (prefers-reduced-motion: reduce){
    .load::before,.leaf,.copy h1 .dots i,.seek::before,.mark,.book,.book__scene,.book__shadow,.copy,.seek,.motes i,.leaf .shade{ animation:none !important; }
    .mark{ opacity:1; } .book,.copy,.seek{ opacity:1; transform:none; }
    .leaf{ opacity:0; } .leaf:nth-child(3){ opacity:1; transform:rotateY(-95deg); }
    .verse span:first-child{ opacity:1; transform:none; }
  }

  /* demo-only replay control */
  .replay{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:5;
    font:500 12px 'DM Sans',sans-serif; letter-spacing:.04em; color:var(--muted);
    background:var(--field); border:1px solid var(--line2); padding:8px 16px; border-radius:999px; cursor:pointer; }
</style>
<script>/*__declTheme*/(function(){try{var m=localStorage.getItem("declare-theme")||"system";var h=new Date().getHours();var t=m==="light"?"light":m==="dark"?"dark":m==="auto"?((h<6||h>=18)?"dark":"light"):((window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
</head>
<body>

<div class="load" role="status" aria-live="polite" aria-label="Searching the Word">
  <div class="motes" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div>

  <div class="mark"><img id="markimg" src="brand/logo-dark-tight.png" alt="Declare &amp; Believe" /></div>

  <div class="book" aria-hidden="true">
    <div class="book__shadow"></div>
    <div class="book__scene">
      <div class="stack left"><span class="lines"></span></div>
      <div class="stack right"><span class="lines"></span></div>
      <div class="spine"></div>
      <div class="leaf"><div class="face front"></div><div class="face back"></div><div class="shade"></div></div>
      <div class="leaf"><div class="face front"></div><div class="face back"></div><div class="shade"></div></div>
      <div class="leaf"><div class="face front"></div><div class="face back"></div><div class="shade"></div></div>
      <div class="leaf"><div class="face front"></div><div class="face back"></div><div class="shade"></div></div>
      <div class="leaf"><div class="face front"></div><div class="face back"></div><div class="shade"></div></div>
      <div class="leaf"><div class="face front"></div><div class="face back"></div><div class="shade"></div></div>
    </div>
  </div>

  <div class="copy">
    <h1>Searching the Word<span class="dots"><i>.</i><i>.</i><i>.</i></span></h1>
    <div class="verse" id="verse"></div>
  </div>

  <div class="seek" aria-hidden="true"></div>
</div>

<button class="replay" id="replay">Replay</button>

<script>
  // theme-correct mark
  function syncMark(){
    var light = document.documentElement.getAttribute('data-theme') === 'light';
    document.getElementById('markimg').src = light ? 'brand/logo-light-tight.png' : 'brand/logo-dark-tight.png';
  }
  syncMark();
  new MutationObserver(syncMark).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});

  // cycling scripture references — "searching" for the right word
  var refs = ['Psalm 34:18','Isaiah 41:10','Matthew 11:28','Philippians 4:6–7','Psalm 46:1','2 Corinthians 12:9','Lamentations 3:22–23','John 14:27'];
  var vEl = document.getElementById('verse'), i = 0, cur = null;
  function nextVerse(){
    if(cur) cur.remove();
    var s = document.createElement('span');
    s.textContent = refs[i % refs.length];
    s.className = 'on';
    vEl.appendChild(s); cur = s; i++;
  }
  nextVerse();
  var verseTimer = setInterval(nextVerse, 2900);

  // demo replay
  document.getElementById('replay').addEventListener('click', function(){
    var l = document.querySelector('.load');
    l.style.animation = 'none'; void l.offsetWidth;
    clearInterval(verseTimer); i = 0; vEl.innerHTML = ''; cur = null; nextVerse();
    verseTimer = setInterval(nextVerse, 2900);
  });
</script>

</body>
</html>
