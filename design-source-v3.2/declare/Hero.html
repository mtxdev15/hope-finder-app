<style>
  /* Hero-specific */
  .hero{ position:relative; z-index:1; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 28px 30px; }
  .hero .kicker{ margin-bottom:22px; max-width:24ch; line-height:1.7; }
  .hero .word{ font-size:clamp(58px,17vw,72px); line-height:.98; font-weight:600; color:var(--text); letter-spacing:.01em; text-shadow:0 0 60px rgba(222,190,100,.35); }
  .hero .sub{ font-size:21px; font-style:italic; color:var(--soft); margin-top:22px; max-width:18ch; line-height:1.45; }
  .hero .markwrap{ width:96px; height:96px; margin:0 auto 24px; display:flex; align-items:center; justify-content:center;
    filter:drop-shadow(0 6px 18px rgba(0,0,0,.4)) drop-shadow(0 0 24px rgba(222,190,100,.26)); }
  html[data-theme="light"] .hero .markwrap{ filter:drop-shadow(0 8px 16px rgba(34,56,46,.18)); }
  .hero .markwrap img{ width:100%; height:100%; object-fit:contain; }
  .hero .markwrap .mk-light{ display:none; }
  html[data-theme="light"] .hero .markwrap .mk-dark{ display:none; }
  html[data-theme="light"] .hero .markwrap .mk-light{ display:block; }

  .herofoot{ position:relative; z-index:1; display:flex; justify-content:space-between; align-items:center; padding:0 26px 30px; }
  .herofoot a{ display:flex; align-items:center; gap:13px; font-size:15px; white-space:nowrap; transition:transform .16s ease; }
  .herofoot a:active{ transform:translateY(1px); }
  .herofoot .begin{ color:var(--text); font-weight:500; }
  .herofoot .begin svg{ color:var(--gold); }
  .herofoot .signin{ color:var(--muted); font-size:14px; }
  .herofoot .uarrow{ width:34px; height:11px; overflow:visible; }
  .herofoot .uarrow path:first-child{ transition:transform .5s cubic-bezier(.16,1,.3,1), opacity .5s ease; transform-origin:right center; transform:scaleX(.62); opacity:.65; }
  .herofoot .uarrow path:last-child{ transition:transform .5s cubic-bezier(.16,1,.3,1); }
  .herofoot a:hover .uarrow path:first-child{ transform:scaleX(1); opacity:1; }
  .herofoot a:hover .uarrow path:last-child{ transform:translateX(3px); }
  @media (prefers-reduced-motion: reduce){ .herofoot .uarrow path{ transition:none !important; transform:none !important; opacity:1 !important; } }

  /* full-screen menu */
  .hero-menu .hm-close{ position:absolute; top:18px; right:20px; z-index:2; width:42px; height:42px; border-radius:50%; border:1px solid var(--line2); background:transparent; color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .4s var(--ease-soft), border-color .3s ease; }
  .hero-menu.open .hm-close{ transform:rotate(0deg); }
  .hero-menu .hm-close{ transform:rotate(-90deg); }
  @media (hover:hover){ .hero-menu .hm-close:hover{ border-color:var(--gold); } }
  .hero-menu .hm-inner{ flex:1; display:flex; flex-direction:column; justify-content:center; gap:2px; padding:0 34px; max-width:640px; margin:0 auto; width:100%; }
  .hero-menu .hm-k{ font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--goldd); margin-bottom:26px; font-weight:600; }
  .hero-menu .hm-item{ display:flex; align-items:center; justify-content:space-between; gap:18px; padding:11px 0; text-decoration:none;
    border-bottom:1px solid color-mix(in srgb, var(--line) 60%, transparent); }
  .hero-menu .hm-item .hm-t{ font-family:'Cormorant Garamond',serif; font-size:clamp(32px,8.4vw,44px); font-weight:600; color:var(--text); line-height:1.05; white-space:nowrap; transition:color .35s var(--ease-soft), transform .45s var(--ease-reveal); }
  .hero-menu .hm-item .uarrow{ width:38px; height:12px; color:var(--muted); opacity:0; transform:translateX(-8px); transition:opacity .4s ease, transform .45s var(--ease-reveal), color .3s ease; }
  .hero-menu .hm-item .uarrow path:first-child{ transform-origin:right center; transform:scaleX(.5); transition:transform .5s var(--ease-reveal); }
  @media (hover:hover){
    .hero-menu .hm-item:hover .hm-t{ color:var(--goldd); transform:translateX(8px); }
    .hero-menu .hm-item:hover .uarrow{ opacity:1; transform:none; color:var(--goldd); }
    .hero-menu .hm-item:hover .uarrow path:first-child{ transform:scaleX(1); }
  }
  .hero-menu .hm-foot{ display:flex; align-items:center; gap:14px; margin-top:30px; font-size:13.5px; }
  .hero-menu .hm-foot a{ color:var(--muted); text-decoration:none; transition:color .25s ease; }
  .hero-menu .hm-foot a:hover{ color:var(--text); }
  .hero-menu .hm-foot span{ color:var(--line2); }
  @media (prefers-reduced-motion: reduce){ .hero-menu .hm-close{ transform:none !important; } }
</style>
<script>/*__declTheme*/(function(){try{var m=localStorage.getItem("declare-theme")||"system";var h=new Date().getHours();var t=m==="light"?"light":m==="dark"?"dark":m==="auto"?((h<6||h>=18)?"dark":"light"):((window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<script>/* entry gate: Begin is a once-a-day threshold.
   The first open each day crosses Begin → the struggle entry;
   every later open that day goes straight in. Brand-new visitors
   also see it (their first day). ?stay=1 forces the landing for review. */
(function(){try{
  var p=new URLSearchParams(location.search);
  if(p.has('stay')||p.has('begin'))return;
  var today=new Date().toISOString().slice(0,10);          // YYYY-MM-DD, local enough for daily ritual
  var crossedToday=localStorage.getItem('declare-begin-day')===today;
  if(crossedToday){ location.replace('Today.html'); }
}catch(e){}})();</script>

<script src="motion.js"></script>
<script>
  document.getElementById('menuBtn').addEventListener('click', function(){
    var m=document.getElementById('heroMenu');
    m.querySelectorAll('.m-menu-item').forEach(function(el,i){ el.style.setProperty('--i', i); });
    m.classList.add('open'); m.setAttribute('aria-hidden','false');
    this.setAttribute('aria-expanded','true');
  });
  document.getElementById('menuClose').addEventListener('click', function(){
    var m=document.getElementById('heroMenu');
    m.classList.remove('open'); m.setAttribute('aria-hidden','true');
    document.getElementById('menuBtn').setAttribute('aria-expanded','false');
  });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ var m=document.getElementById('heroMenu'); if(m.classList.contains('open')){ m.classList.remove('open'); m.setAttribute('aria-hidden','true'); document.getElementById('menuBtn').setAttribute('aria-expanded','false'); } } });

  // Greet by name + part of day for a returning, signed-in user (still a daily threshold)
  (function(){try{
    var fn=localStorage.getItem('declare-firstname');
    var h=new Date().getHours();
    var part = h<12?'morning':h<18?'afternoon':'evening';
    if(fn){
      var k=document.getElementById('heroKicker');
      if(k) k.textContent='Good '+part+', '+fn;
    }
  }catch(e){}})();

  // Crossing the threshold records today's date — Begin won't reappear until tomorrow
  function crossToday(){ try{ localStorage.setItem('declare-begin-day', new Date().toISOString().slice(0,10)); }catch(e){} }
  document.querySelectorAll('.herofoot a, #menuBtn').forEach(function(a){ a.addEventListener('click', crossToday); });
</script>
